<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Appointment Scheduler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 8px; font-size: 24px; }
        p { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .tabs { display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: #f5f5f5; color: #666; font-size: 14px; }
        .tab.active { background: #1a73e8; color: white; }
        input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 14px; font-size: 14px; outline: none; }
        input:focus { border-color: #1a73e8; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        button:hover { background: #1557b0; }
        .msg { text-align: center; margin-top: 12px; font-size: 13px; color: red; }
        .success { color: green; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 MediBook</h1>
    <p>Smart Hospital Appointment Scheduler</p>

    <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Login</div>
        <div class="tab" onclick="showTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email"/>
        <input type="password" id="loginPassword" placeholder="Password"/>
        <button onclick="login()">Login</button>
        <p class="msg" id="loginMsg"></p>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
        <input type="text" id="regName" placeholder="Full Name"/>
        <input type="email" id="regEmail" placeholder="Email"/>
        <input type="password" id="regPassword" placeholder="Password"/>
        <input type="text" id="regPhone" placeholder="Phone Number"/>
        <button onclick="register()">Register</button>
        <p class="msg" id="registerMsg"></p>
    </div>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const res = await fetch(`/api/auth/login?email=${email}&password=${password}`, { method: 'POST' });
        if (res.ok) {
            const user = await res.json();
            localStorage.setItem('user', JSON.stringify(user));
            window.location.href = '/doctors.html';
        } else {
            document.getElementById('loginMsg').textContent = 'Invalid email or password!';
        }
    }

    async function register() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const phone = document.getElementById('regPhone').value;
        const res = await fetch(`/api/auth/register?name=${name}&email=${email}&password=${password}&phone=${phone}`, { method: 'POST' });
        if (res.ok) {
            document.getElementById('registerMsg').className = 'msg success';
            document.getElementById('registerMsg').textContent = 'Registered! Please login.';
        } else {
            document.getElementById('registerMsg').textContent = 'Registration failed!';
        }
    }
</script>
</body>
</html>
